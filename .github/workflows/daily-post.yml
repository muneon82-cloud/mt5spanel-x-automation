name: Daily X Post

on:
  schedule:
    - cron: "10 0 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Generate only, do not post to X"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: daily-x-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and post
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.1' }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          POST_HISTORY_PATH: data/post_history.json
        run: python scripts/post_to_x.py

      - name: Commit updated history
        if: always()
        run: |
          if git diff --quiet -- data/post_history.json; then
            echo "No history changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/post_history.json
          git commit -m "Update X post history"
          git push
